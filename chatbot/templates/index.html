<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FAQ Chatbot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d1a;
      --surface: #13132b;
      --border: #252545;
      --accent: #7c3aed;
      --accent2: #3b82f6;
      --text: #e2e2f0;
      --muted: #7070a0;
      --user-bg: #1e1b4b;
      --bot-bg: #131330;
      --success: #22c55e;
      --error: #f87171;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .topbar h1 {
      font-size: 1.15rem;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stats-bar {
      display: flex;
      gap: 16px;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .stats-bar span b { color: #a78bfa; }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 300px;
      border-right: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      gap: 16px;
      flex-shrink: 0;
      overflow-y: auto;
    }

    .sidebar h2 { font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: #1a1040; color: var(--text); }
    .upload-zone input { display: none; }
    .upload-zone .icon { font-size: 1.8rem; margin-bottom: 6px; }

    textarea#pasteText {
      width: 100%;
      height: 110px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.82rem;
      padding: 10px;
      resize: vertical;
      outline: none;
      font-family: inherit;
    }

    textarea#pasteText:focus { border-color: var(--accent); }

    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 0.88rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
    .btn-danger  { background: #3b1f1f; color: var(--error); border: 1px solid #5a2020; }

    #uploadStatus {
      font-size: 0.8rem;
      min-height: 18px;
      text-align: center;
    }

    .status-ok  { color: var(--success); }
    .status-err { color: var(--error); }

    .file-list { display: flex; flex-direction: column; gap: 6px; }

    .file-tag {
      background: #1a1040;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.78rem;
      color: #a78bfa;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Chat area ── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg { display: flex; gap: 10px; max-width: 80%; animation: fadeUp 0.25s ease; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    .msg.user .avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
    .msg.bot  .avatar { background: #1e1b4b; border: 1px solid var(--border); }

    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 0.9rem;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .bubble { background: var(--user-bg); border-bottom-right-radius: 4px; }
    .msg.bot  .bubble { background: var(--bot-bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

    .typing .bubble { color: var(--muted); font-style: italic; }

    /* ── Input bar ── */
    .input-bar {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-bar textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.92rem;
      padding: 12px 14px;
      resize: none;
      outline: none;
      font-family: inherit;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.5;
    }

    .input-bar textarea:focus { border-color: var(--accent); }

    .send-btn {
      width: 44px; height: 44px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }

    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Empty state ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 10px;
      font-size: 0.9rem;
      text-align: center;
      padding: 20px;
    }

    .empty-state .big { font-size: 2.5rem; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <h1>🤖 FAQ Knowledge Chatbot</h1>
  <div class="stats-bar">
    <span>Chunks: <b id="statChunks">0</b></span>
    <span>Turns: <b id="statTurns">0</b></span>
    <span>Model: <b id="statModel">—</b></span>
  </div>
</div>

<div class="layout">

  <!-- Sidebar: upload -->
  <aside class="sidebar">
    <h2>📂 Knowledge Base</h2>

    <!-- File drop zone -->
    <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div class="icon">📄</div>
      <div>Drop or click to upload</div>
      <div style="font-size:0.75rem;margin-top:4px">.txt · .md · .pdf</div>
      <input type="file" id="fileInput" accept=".txt,.md,.pdf" multiple/>
    </div>

    <!-- Paste text -->
    <h2>✏️ Paste Text</h2>
    <textarea id="pasteText" placeholder="Paste FAQ content, docs, or any text here…"></textarea>
    <button class="btn btn-primary" onclick="pasteIngest()">Ingest Text</button>

    <div id="uploadStatus"></div>

    <!-- Uploaded files list -->
    <div class="file-list" id="fileList"></div>

    <!-- Clear -->
    <button class="btn btn-danger" onclick="clearAll()">🗑 Clear Everything</button>
  </aside>

  <!-- Chat -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="big">💬</div>
        <div>Upload documents or paste text on the left,<br/>then ask anything about them.</div>
      </div>
    </div>

    <div class="input-bar">
      <textarea id="userInput" rows="1" placeholder="Ask a question about your documents…"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>

</div>

<script>
  // ── Helpers ──────────────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 120) + "px";
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function scrollBottom() {
    const m = $("messages");
    m.scrollTop = m.scrollHeight;
  }

  function setStatus(msg, type = "") {
    $("uploadStatus").innerHTML = `<span class="status-${type}">${msg}</span>`;
  }

  function updateStats(s) {
    if (!s) return;
    $("statChunks").textContent = s.chunks;
    $("statTurns").textContent  = s.turns;
    $("statModel").textContent  = s.model;
  }

  // ── Render messages ──────────────────────────────────────────────────────
  function appendMsg(role, text, id = null) {
    $("emptyState")?.remove();
    const wrap = document.createElement("div");
    wrap.className = `msg ${role}`;
    if (id) wrap.id = id;
    wrap.innerHTML = `
      <div class="avatar">${role === "user" ? "🧑" : "🤖"}</div>
      <div class="bubble">${escHtml(text)}</div>`;
    $("messages").appendChild(wrap);
    scrollBottom();
    return wrap;
  }

  function escHtml(t) {
    return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function showTyping() {
    const el = document.createElement("div");
    el.className = "msg bot typing";
    el.id = "typing";
    el.innerHTML = `<div class="avatar">🤖</div><div class="bubble">Thinking…</div>`;
    $("messages").appendChild(el);
    scrollBottom();
  }

  function removeTyping() { $("typing")?.remove(); }

  // ── Chat ─────────────────────────────────────────────────────────────────
  async function sendMessage() {
    const input = $("userInput");
    const message = input.value.trim();
    if (!message) return;

    input.value = "";
    input.style.height = "auto";
    $("sendBtn").disabled = true;

    appendMsg("user", message);
    showTyping();

    try {
      const res  = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message }),
      });
      const data = await res.json();
      removeTyping();

      if (!res.ok) { appendMsg("bot", "⚠️ " + (data.error || "Server error")); }
      else         { appendMsg("bot", data.answer); updateStats(data.stats); }
    } catch {
      removeTyping();
      appendMsg("bot", "⚠️ Could not reach the server.");
    }

    $("sendBtn").disabled = false;
    input.focus();
  }

  // ── Upload file ──────────────────────────────────────────────────────────
  $("fileInput").addEventListener("change", () => uploadFiles($("fileInput").files));

  const dz = $("dropZone");
  dz.addEventListener("dragover",  e => { e.preventDefault(); dz.classList.add("drag"); });
  dz.addEventListener("dragleave", () => dz.classList.remove("drag"));
  dz.addEventListener("drop", e => {
    e.preventDefault(); dz.classList.remove("drag");
    uploadFiles(e.dataTransfer.files);
  });

  async function uploadFiles(files) {
    for (const file of files) {
      setStatus(`Uploading ${file.name}…`);
      const fd = new FormData();
      fd.append("file", file);
      try {
        const res  = await fetch("/upload", { method: "POST", body: fd });
        const data = await res.json();
        if (!res.ok) { setStatus(data.error, "err"); }
        else {
          setStatus(data.message, "ok");
          addFileTag(file.name);
          fetchStats();
        }
      } catch { setStatus("Upload failed.", "err"); }
    }
  }

  // ── Paste ingest ─────────────────────────────────────────────────────────
  async function pasteIngest() {
    const text = $("pasteText").value.trim();
    if (!text) { setStatus("Nothing to ingest.", "err"); return; }
    setStatus("Ingesting…");
    try {
      const res  = await fetch("/upload", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text }),
      });
      const data = await res.json();
      if (!res.ok) { setStatus(data.error, "err"); }
      else {
        setStatus(data.message, "ok");
        $("pasteText").value = "";
        addFileTag("Pasted text");
        fetchStats();
      }
    } catch { setStatus("Failed.", "err"); }
  }

  // ── Clear ────────────────────────────────────────────────────────────────
  async function clearAll() {
    if (!confirm("Clear all documents and conversation history?")) return;
    await fetch("/clear", { method: "POST" });
    $("messages").innerHTML = `
      <div class="empty-state" id="emptyState">
        <div class="big">💬</div>
        <div>Upload documents or paste text on the left,<br/>then ask anything about them.</div>
      </div>`;
    $("fileList").innerHTML = "";
    setStatus("Cleared.", "ok");
    fetchStats();
  }

  // ── Misc ─────────────────────────────────────────────────────────────────
  function addFileTag(name) {
    const tag = document.createElement("div");
    tag.className = "file-tag";
    tag.innerHTML = `📎 ${escHtml(name)}`;
    $("fileList").appendChild(tag);
  }

  async function fetchStats() {
    try {
      const res = await fetch("/stats");
      updateStats(await res.json());
    } catch {}
  }

  fetchStats();
</script>
</body>
</html>
